name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'deploy.sh'
      - 'update.sh'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: 🚀 Update server on VPS
    runs-on: ubuntu-latest
    if: github.repository == 'illi-homz/voidchat-server'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🚀 Deploy via SSH
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" -p ${{ secrets.SSH_PORT || '22' }} 'bash -s' << 'EOF'
            set -euo pipefail
            SERVER_DIR="$HOME/voidchat-server"

            echo "━━━ [CI/CD] VoidChat Server — Auto Update ━━━"
            echo ""

            if [ ! -d "$SERVER_DIR" ]; then
              echo "[✗] Сервер не найден. Выполните deploy.sh вручную:"
              echo "    curl -sS https://raw.githubusercontent.com/illi-homz/voidchat-server/main/deploy.sh | sudo bash"
              exit 1
            fi

            cd "$SERVER_DIR"

            # Stash local changes (e.g. pm2 logs)
            git stash --include-untracked 2>/dev/null || true

            # Pull latest code
            echo "[1/5] Скачиваем обновления..."
            git pull --ff-only

            # Install dependencies + build
            echo "[2/5] Устанавливаем зависимости..."
            npm install --omit=dev

            echo "[3/5] Собираем TypeScript..."
            npm run build

            # Restart via pm2
            echo "[4/5] Перезапускаем сервер..."
            if pm2 pid voidchat-server &>/dev/null; then
              pm2 restart voidchat-server --update-env
            else
              pm2 start dist/server.js --name voidchat-server -i 1 \
                --max-memory-restart "200M" --restart-delay 3000 \
                --max-restarts 5
              pm2 save
            fi

            # Health check
            echo "[5/5] Проверка здоровья..."
            sleep 3
            PORT="${PORT:-9001}"
            HEALTH=$(curl -s --max-time 5 "http://localhost:${PORT}/" 2>/dev/null || echo "failed")

            if echo "$HEALTH" | grep -q '"status"'; then
              UPTIME=$(echo "$HEALTH" | grep -o '"uptime":[0-9]*' | cut -d: -f2)
              CONNS=$(echo "$HEALTH" | grep -o '"connections":[0-9]*' | cut -d: -f2)
              echo "[✓] Сервер работает: uptime=${UPTIME}s, connections=${CONNS}"
            else
              echo "[!] Health-check не прошёл. Проверьте: pm2 logs voidchat-server --lines 20"
              exit 1
            fi
          EOF

      - name: ✅ Health check
        run: |
          echo "Деплой завершён. Сервер обновлён до коммита ${{ github.sha }}"
